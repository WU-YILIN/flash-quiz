<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flash Quiz Complete Card Preview</title>
    <style>
      :root {
        --bg: #141414;
        --card-bg:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.96), transparent 28%),
          radial-gradient(circle at 78% 18%, rgba(255, 210, 126, 0.28), transparent 18%),
          linear-gradient(180deg, #fffaf2 0%, #f5e8d6 100%);
        --text: #2f261d;
        --muted: #7a6858;
        --line: rgba(209, 173, 135, 0.26);
        --pill: rgba(255, 248, 240, 0.74);
        --pill-strong: linear-gradient(180deg, #fff1e2 0%, #f7ddc0 100%);
        --accent: #c86a31;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
      }

      .frame {
        width: min(860px, calc(100vw - 32px));
        padding: 18px;
        border-radius: 28px;
        background: var(--card-bg);
        box-shadow:
          0 22px 50px rgba(0, 0, 0, 0.28),
          inset 0 1px 0 rgba(255, 255, 255, 0.92);
        position: relative;
        overflow: visible;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 164px;
        gap: 18px;
        align-items: stretch;
      }

      .main {
        display: flex;
        flex-direction: column;
        gap: 14px;
        min-width: 0;
      }

      h1 {
        margin: 0;
        font-size: 32px;
        line-height: 1.08;
        letter-spacing: -0.04em;
      }

      .desc {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .summary {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 12px;
        padding: 12px 14px;
        border-radius: 18px;
        border: 1px solid rgba(214, 122, 63, 0.14);
        background: rgba(255, 249, 241, 0.72);
      }

      .summary-item {
        display: flex;
        flex-direction: column;
        gap: 3px;
        min-width: 92px;
      }

      .summary-label {
        font-size: 10px;
        line-height: 1;
        color: #9b816b;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .summary-value {
        font-size: 15px;
        line-height: 1.15;
        color: #3a2d21;
        font-weight: 800;
      }

      .summary-divider {
        width: 1px;
        align-self: stretch;
        background: linear-gradient(180deg, transparent, rgba(209, 173, 135, 0.44), transparent);
      }

      .summary-badge {
        margin-left: auto;
        min-height: 36px;
        padding: 0 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        background: var(--pill-strong);
        color: var(--accent);
        font-size: 13px;
        font-weight: 800;
        white-space: nowrap;
      }

      .bottom {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding-top: 2px;
      }

      .hint {
        font-size: 12px;
        color: #8e7967;
      }

      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .btn {
        min-width: 134px;
        min-height: 42px;
        padding: 0 18px;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: rgba(255, 248, 240, 0.86);
        color: #584536;
        font-size: 13px;
        font-weight: 700;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .btn.primary {
        border-color: rgba(214, 122, 63, 0.24);
        background: linear-gradient(180deg, #de8243 0%, #ca6b31 100%);
        color: #fff8ef;
      }

      .score {
        border-radius: 22px;
        border: 1px solid rgba(214, 122, 63, 0.18);
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.94), transparent 44%),
          linear-gradient(180deg, #fff3e3 0%, #f2dcc0 100%);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.92),
          0 12px 28px rgba(191, 119, 63, 0.1),
          0 0 0 8px rgba(255, 212, 140, 0.1);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 6px;
        padding: 18px 12px;
      }

      .score-label {
        font-size: 11px;
        color: #9b7354;
        font-weight: 700;
      }

      .score-value {
        font-size: 54px;
        line-height: 1;
        color: var(--accent);
        font-weight: 800;
        letter-spacing: -0.06em;
      }

      .score-note {
        font-size: 12px;
        color: #836956;
      }

      .firework {
        position: absolute;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background:
          radial-gradient(circle, rgba(255, 255, 255, 0.96) 0 12%, transparent 13%),
          repeating-conic-gradient(
            from 0deg,
            rgba(255, 191, 88, 0.98) 0deg 12deg,
            transparent 12deg 26deg,
            rgba(255, 114, 94, 0.95) 26deg 38deg,
            transparent 38deg 52deg,
            rgba(128, 204, 123, 0.94) 52deg 64deg,
            transparent 64deg 78deg,
            rgba(119, 181, 255, 0.94) 78deg 90deg,
            transparent 90deg 104deg
          );
        mask: radial-gradient(circle, transparent 0 24%, #000 26% 100%);
        opacity: 0.9;
      }

      .fw1 { top: -18px; left: 44px; transform: scale(5.6); }
      .fw2 { top: -26px; right: 120px; transform: scale(4.6); }
      .fw3 { bottom: -18px; left: 54%; transform: scale(5); }
      .fw4 { bottom: 0; right: -12px; transform: scale(4.8); }

      @media (max-width: 760px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .bottom {
          flex-direction: column;
          align-items: flex-start;
        }

        .summary {
          flex-direction: column;
          align-items: flex-start;
        }

        .summary-divider {
          display: none;
        }

        .summary-badge {
          margin-left: 0;
        }

        .score {
          min-height: 128px;
        }
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="firework fw1"></div>
      <div class="firework fw2"></div>
      <div class="firework fw3"></div>
      <div class="firework fw4"></div>

      <div class="layout">
        <section class="main">
          <div>
            <h1>本轮 quiz 已完成</h1>
            <p class="desc">本轮答题已结束，继续下一轮或关闭弹窗整理题库。</p>
          </div>

          <div class="summary">
            <div class="summary-item">
              <div class="summary-label">Completed</div>
              <div class="summary-value">10 题</div>
            </div>
            <div class="summary-divider"></div>
            <div class="summary-item">
              <div class="summary-label">Avg Time</div>
              <div class="summary-value">8 秒</div>
            </div>
            <div class="summary-badge">掌握很好</div>
          </div>

          <div class="bottom">
            <div class="actions">
              <div class="btn primary">再来一轮</div>
              <div class="btn">关闭</div>
            </div>
            <div class="hint">优先继续复习到期题，保持记忆曲线连续。</div>
          </div>
        </section>

        <aside class="score">
          <div class="score-label">本轮成绩</div>
          <div class="score-value">100%</div>
          <div class="score-note">10 / 10 题答对</div>
        </aside>
      </div>
    </div>
  </body>
</html>
