<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flash Quiz Complete Card Centered Preview</title>
    <style>
      :root {
        --bg: #141414;
        --card:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.96), transparent 28%),
          radial-gradient(circle at 50% 10%, rgba(255, 210, 126, 0.22), transparent 20%),
          linear-gradient(180deg, #fffaf2 0%, #f5e8d6 100%);
        --text: #2e251d;
        --muted: #7f6c5a;
        --line: rgba(214, 122, 63, 0.16);
        --accent: #c96a31;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
      }

      .frame {
        position: relative;
        width: min(760px, calc(100vw - 32px));
        padding: 28px 28px 24px;
        border-radius: 30px;
        background: var(--card);
        box-shadow:
          0 24px 54px rgba(0, 0, 0, 0.3),
          inset 0 1px 0 rgba(255, 255, 255, 0.92);
        overflow: visible;
      }

      .firework {
        position: absolute;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background:
          radial-gradient(circle, rgba(255, 255, 255, 0.96) 0 12%, transparent 13%),
          repeating-conic-gradient(
            from 0deg,
            rgba(255, 192, 88, 0.98) 0deg 12deg,
            transparent 12deg 24deg,
            rgba(255, 114, 94, 0.95) 24deg 36deg,
            transparent 36deg 48deg,
            rgba(125, 204, 122, 0.94) 48deg 60deg,
            transparent 60deg 72deg,
            rgba(118, 180, 255, 0.94) 72deg 84deg,
            transparent 84deg 96deg
          );
        mask: radial-gradient(circle, transparent 0 24%, #000 26% 100%);
        opacity: 0.95;
      }

      .fw1 { top: -22px; left: 42px; transform: scale(4.8); }
      .fw2 { top: -28px; right: 74px; transform: scale(4.2); }
      .fw3 { bottom: -16px; left: 18%; transform: scale(4); }
      .fw4 { bottom: -22px; right: 18%; transform: scale(4.6); }

      .header {
        text-align: center;
      }

      .title {
        margin: 0;
        font-size: 34px;
        line-height: 1.08;
        letter-spacing: -0.04em;
      }

      .desc {
        margin: 8px auto 0;
        max-width: 500px;
        font-size: 13px;
        line-height: 1.5;
        color: var(--muted);
      }

      .score {
        margin: 18px auto 0;
        width: min(320px, 100%);
        min-height: 192px;
        border-radius: 28px;
        border: 1px solid rgba(214, 122, 63, 0.18);
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.94), transparent 44%),
          linear-gradient(180deg, #fff3e3 0%, #f2dcc0 100%);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.92),
          0 16px 34px rgba(191, 119, 63, 0.12),
          0 0 0 10px rgba(255, 212, 140, 0.1);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        text-align: center;
      }

      .score-label {
        font-size: 12px;
        font-weight: 700;
        color: #9a7354;
      }

      .score-value {
        font-size: 72px;
        line-height: 1;
        letter-spacing: -0.08em;
        font-weight: 800;
        color: var(--accent);
      }

      .score-note {
        font-size: 14px;
        color: #836955;
      }

      .summary {
        margin: 18px auto 0;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        max-width: 560px;
      }

      .pill {
        min-height: 38px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 14px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 248, 240, 0.76);
        color: #6f5845;
        font-size: 12px;
        font-weight: 700;
        white-space: nowrap;
      }

      .pill.accent {
        background: linear-gradient(180deg, #fff1e2 0%, #f7ddc0 100%);
        color: var(--accent);
      }

      .actions {
        margin-top: 18px;
        display: flex;
        justify-content: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .btn {
        min-width: 144px;
        min-height: 44px;
        border-radius: 16px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 18px;
        font-size: 13px;
        font-weight: 700;
        border: 1px solid rgba(214, 122, 63, 0.18);
      }

      .btn.primary {
        background: linear-gradient(180deg, #de8243 0%, #ca6b31 100%);
        color: #fff8ef;
      }

      .btn.secondary {
        background: rgba(255, 248, 240, 0.86);
        color: #5a4737;
      }

      @media (max-width: 640px) {
        .frame {
          padding: 22px 18px 18px;
        }

        .title {
          font-size: 28px;
        }

        .score {
          min-height: 168px;
        }

        .score-value {
          font-size: 58px;
        }
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="firework fw1"></div>
      <div class="firework fw2"></div>
      <div class="firework fw3"></div>
      <div class="firework fw4"></div>

      <section class="header">
        <h1 class="title">本轮 quiz 已完成</h1>
        <p class="desc">本轮答题已结束，继续下一轮复习，或者关闭弹窗回到笔记。</p>
      </section>

      <section class="score">
        <div class="score-label">本轮成绩</div>
        <div class="score-value">100%</div>
        <div class="score-note">10 / 10 题答对</div>
      </section>

      <section class="summary">
        <div class="pill">已完成 10 题</div>
        <div class="pill">平均用时 8 秒</div>
        <div class="pill accent">掌握很好</div>
      </section>

      <section class="actions">
        <div class="btn primary">再来一轮</div>
        <div class="btn secondary">关闭</div>
      </section>
    </div>
  </body>
</html>
